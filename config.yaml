          query: tooth root segmentation in dental imaging, especially for endodontic and surgical planning applications
        - keyword: mandibular canal
          keyword_cn: 下牙槽神经管
          query: inferior alveolar nerve canal segmentation in dental images for surgical risk assessment and planning
        - keyword: pulp
