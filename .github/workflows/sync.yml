name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Random delay to spread scheduled runs
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(shuf -i 0-3599 -n 1)
          echo "Sleeping ${DELAY}s (≈$((DELAY/60))min) to stagger fork runs over 1 hour …"
          sleep $DELAY

      # 1. 检出用户仓库的代码
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync upstream changes
        run: |
          set -euo pipefail

          UPSTREAM_REPO="ziwenhahaha/daily-paper-reader"
          UPSTREAM_BRANCH="main"
          TARGET_BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi

          git fetch origin "${TARGET_BRANCH}"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

          if git merge --no-edit --no-ff "upstream/${UPSTREAM_BRANCH}"; then
            if git diff --quiet "origin/${TARGET_BRANCH}" HEAD; then
              echo "No upstream changes to sync."
              exit 0
            fi
            git push origin HEAD:"${TARGET_BRANCH}"
          else
            echo "[Error] 自动同步失败，存在冲突，请手动处理。"
            git merge --abort || true
            exit 1
          fi
